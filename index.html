<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anurag Singh Rawat | Full-Stack Developer Portfolio</title>
    <meta name="description" content="Portfolio of Anurag Singh Rawat, a Full-Stack Developer specializing in scalable architectures.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Custom Tailwind Config -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0f1729",
              "accent": "#f97316",
              "background-light": "#f6f7f8",
              "background-dark": "#14171e",
              "card-dark": "#1e293b",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
    
    <!-- Custom Styles -->
    <style>
      body {
        min-height: 100vh;
      }
      .orange-glow {
        box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
      }
      /* Fallback for glass effect if backdrop-filter isn't fully supported (though Tailwind handles this well) */
      .glass-nav {
        background: rgba(15, 23, 41, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      
      /* Smooth scrolling offset for fixed header */
      section {
        scroll-margin-top: 80px;
      }
    </style>

  }
}
</script>
